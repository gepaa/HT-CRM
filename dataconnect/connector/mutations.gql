# Mutations for Movie App

# Add or update a review for a movie. Requires a signed-in user.
mutation AddReview($movieId: UUID!, $rating: Int!, $reviewText: String!) @auth(level: USER) {
  review_upsert(
    data: {
      userId_expr: "auth.uid"
      movieId: $movieId
      rating: $rating
      reviewText: $reviewText
    }
  )
}

# Create or update a user record when they log in.
mutation UpsertUser($id: String!, $username: String!) @auth(level: PUBLIC) {
  user_upsert(
    data: {
      id: $id
      username: $username
    }
  )
}

# Create a movie record.
mutation AddMovie($title: String!, $imageUrl: String!, $genre: String!) @auth(level: PUBLIC) {
  movie_insert(
    data: {
      title: $title
      imageUrl: $imageUrl
      genre: $genre
    }
  )
}
