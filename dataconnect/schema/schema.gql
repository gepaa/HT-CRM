# Movie Schema

type Movie @table {
  title: String!
  imageUrl: String!
  genre: String
}

type User @table(key: "id") {
  id: String!
  username: String!
}

type Review @table(key: ["movie", "user"]) {
  user: User!
  movie: Movie!
  rating: Int
  reviewText: String
  reviewDate: Date! @default(expr: "request.time")
}
